<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
  </defs>

  <rect width="880" height="340" fill="url(#bg)"/>

  <!-- Label section -->
  <text x="440" y="38" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="rgba(64,216,192,0.5)" letter-spacing="0.12em">THREE PILLARS</text>

  <!-- ── Pilier 1 : Contraindre ── -->
  <rect x="40" y="64" width="250" height="210" rx="8" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>

  <circle cx="165" cy="108" r="22" fill="rgba(64,216,192,0.06)" stroke="rgba(64,216,192,0.3)" stroke-width="0.8"/>
  <text x="165" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#40d8c0" font-weight="500">1</text>

  <text x="165" y="154" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f0f8f5" font-weight="300" letter-spacing="0.03em">Constrain</text>

  <text x="165" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">A strict role.</text>
  <text x="165" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">A scope.</text>
  <text x="165" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Prohibitions.</text>

  <text x="165" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(64,216,192,0.25)" font-style="italic">limitation makes it useful</text>

  <!-- ── Pilier 2 : Eprouver ── -->
  <rect x="315" y="64" width="250" height="210" rx="8" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>

  <circle cx="440" cy="108" r="22" fill="rgba(64,216,192,0.06)" stroke="rgba(64,216,192,0.3)" stroke-width="0.8"/>
  <text x="440" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#40d8c0" font-weight="500">2</text>

  <text x="440" y="154" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f0f8f5" font-weight="300" letter-spacing="0.03em">Challenge</text>

  <text x="440" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Disagreements</text>
  <text x="440" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">are signals.</text>
  <text x="440" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Not bugs.</text>

  <text x="440" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(64,216,192,0.25)" font-style="italic">friction forces clarity</text>

  <!-- ── Pilier 3 : Arbitrer ── -->
  <rect x="590" y="64" width="250" height="210" rx="8" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>

  <circle cx="715" cy="108" r="22" fill="rgba(64,216,192,0.06)" stroke="rgba(64,216,192,0.3)" stroke-width="0.8"/>
  <text x="715" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#40d8c0" font-weight="500">3</text>

  <text x="715" y="154" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f0f8f5" font-weight="300" letter-spacing="0.03em">Arbitrate</text>

  <text x="715" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">The orchestrator listens,</text>
  <text x="715" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">questions,</text>
  <text x="715" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">then decides.</text>

  <text x="715" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(64,216,192,0.25)" font-style="italic">the orchestrator decides. always.</text>

  <!-- Mycélium connecteur -->
  <path d="M 292,170 Q 303,162 315,168" fill="none" stroke="rgba(64,180,160,0.1)" stroke-width="0.5"/>
  <path d="M 567,170 Q 578,162 590,168" fill="none" stroke="rgba(64,180,160,0.1)" stroke-width="0.5"/>

  <!-- Filet footer -->
  <line x1="40" y1="310" x2="840" y2="310" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="440" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(64,216,192,0.2)">sofia · three pillars</text>
</svg>
