<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="880" height="340" fill="url(#bg)"/>

  <!-- Grille fine -->
  <g opacity="0.08" stroke="#00c8dc" stroke-width="0.3">
    <line x1="0" y1="20" x2="880" y2="20"/><line x1="0" y1="40" x2="880" y2="40"/>
    <line x1="0" y1="60" x2="880" y2="60"/><line x1="0" y1="80" x2="880" y2="80"/>
    <line x1="0" y1="100" x2="880" y2="100"/><line x1="0" y1="120" x2="880" y2="120"/>
    <line x1="0" y1="140" x2="880" y2="140"/><line x1="0" y1="160" x2="880" y2="160"/>
    <line x1="0" y1="180" x2="880" y2="180"/><line x1="0" y1="200" x2="880" y2="200"/>
    <line x1="0" y1="220" x2="880" y2="220"/><line x1="0" y1="240" x2="880" y2="240"/>
    <line x1="0" y1="260" x2="880" y2="260"/><line x1="0" y1="280" x2="880" y2="280"/>
    <line x1="0" y1="300" x2="880" y2="300"/><line x1="0" y1="320" x2="880" y2="320"/>
    <line x1="20" y1="0" x2="20" y2="340"/><line x1="40" y1="0" x2="40" y2="340"/>
    <line x1="60" y1="0" x2="60" y2="340"/><line x1="80" y1="0" x2="80" y2="340"/>
    <line x1="100" y1="0" x2="100" y2="340"/><line x1="120" y1="0" x2="120" y2="340"/>
  </g>

  <!-- Spores -->
  <circle cx="120" cy="60" r="40" fill="#40d8c0" opacity="0.03"/>
  <circle cx="700" cy="280" r="55" fill="#40d8c0" opacity="0.03"/>
  <circle cx="440" cy="320" r="35" fill="#40d8c0" opacity="0.04"/>
  <circle cx="800" cy="100" r="30" fill="#40d8c0" opacity="0.03"/>

  <!-- Caustics -->
  <ellipse cx="300" cy="180" rx="120" ry="40" fill="#00c8dc" opacity="0.02" transform="rotate(-8,300,180)"/>
  <ellipse cx="600" cy="140" rx="100" ry="30" fill="#00c8dc" opacity="0.02" transform="rotate(5,600,140)"/>

  <!-- Particules -->
  <circle cx="150" cy="90" r="1" fill="#40d8c0" opacity="0.15"/>
  <circle cx="380" cy="50" r="1.2" fill="#40d8c0" opacity="0.12"/>
  <circle cx="720" cy="75" r="0.8" fill="#40d8c0" opacity="0.18"/>
  <circle cx="560" cy="310" r="1" fill="#40d8c0" opacity="0.14"/>
  <circle cx="80" cy="260" r="1.3" fill="#40d8c0" opacity="0.12"/>
  <circle cx="830" cy="220" r="0.9" fill="#40d8c0" opacity="0.16"/>

  <!-- Label section -->
  <text x="440" y="38" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="rgba(64,216,192,0.5)" letter-spacing="0.12em">TROIS PILIERS</text>

  <!-- ── Pilier 1 : Contraindre ── -->
  <rect x="40" y="64" width="250" height="210" rx="8" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>

  <circle cx="165" cy="108" r="22" fill="rgba(64,216,192,0.06)" stroke="rgba(64,216,192,0.3)" stroke-width="0.8" filter="url(#glow)"/>
  <text x="165" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#40d8c0" font-weight="500">1</text>

  <text x="165" y="154" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f0f8f5" font-weight="300" letter-spacing="0.03em">Contraindre</text>

  <text x="165" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Un role strict.</text>
  <text x="165" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Un perimetre.</text>
  <text x="165" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Des interdits.</text>

  <text x="165" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(64,216,192,0.25)" font-style="italic">la limitation rend utile</text>

  <!-- ── Pilier 2 : Frotter ── -->
  <rect x="315" y="64" width="250" height="210" rx="8" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>

  <circle cx="440" cy="108" r="22" fill="rgba(64,216,192,0.06)" stroke="rgba(64,216,192,0.3)" stroke-width="0.8" filter="url(#glow)"/>
  <text x="440" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#40d8c0" font-weight="500">2</text>

  <text x="440" y="154" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f0f8f5" font-weight="300" letter-spacing="0.03em">Frotter</text>

  <text x="440" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Les desaccords</text>
  <text x="440" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">sont des signaux.</text>
  <text x="440" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">Pas des bugs.</text>

  <text x="440" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(64,216,192,0.25)" font-style="italic">la friction force la clarte</text>

  <!-- ── Pilier 3 : Arbitrer ── -->
  <rect x="590" y="64" width="250" height="210" rx="8" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>

  <circle cx="715" cy="108" r="22" fill="rgba(64,216,192,0.06)" stroke="rgba(64,216,192,0.3)" stroke-width="0.8" filter="url(#glow)"/>
  <text x="715" y="112" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#40d8c0" font-weight="500">3</text>

  <text x="715" y="154" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f0f8f5" font-weight="300" letter-spacing="0.03em">Arbitrer</text>

  <text x="715" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">L'humain ecoute,</text>
  <text x="715" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">questionne,</text>
  <text x="715" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(64,216,192,0.4)">puis tranche.</text>

  <text x="715" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(64,216,192,0.25)" font-style="italic">l'humain decide. toujours.</text>

  <!-- Mycélium connecteur -->
  <path d="M 292,170 Q 303,162 315,168" fill="none" stroke="rgba(64,180,160,0.1)" stroke-width="0.5"/>
  <path d="M 567,170 Q 578,162 590,168" fill="none" stroke="rgba(64,180,160,0.1)" stroke-width="0.5"/>

  <!-- Filet footer -->
  <line x1="40" y1="310" x2="840" y2="310" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="440" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(64,216,192,0.2)">voix · trois piliers</text>
</svg>
