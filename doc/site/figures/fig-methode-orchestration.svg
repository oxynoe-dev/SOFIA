<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="880" height="460" fill="url(#bg)"/>

  <!-- Grille fine -->
  <g opacity="0.06" stroke="#00c8dc" stroke-width="0.3">
    <line x1="0" y1="20" x2="880" y2="20"/><line x1="0" y1="40" x2="880" y2="40"/>
    <line x1="0" y1="60" x2="880" y2="60"/><line x1="0" y1="80" x2="880" y2="80"/>
    <line x1="0" y1="100" x2="880" y2="100"/><line x1="0" y1="120" x2="880" y2="120"/>
    <line x1="0" y1="140" x2="880" y2="140"/><line x1="0" y1="160" x2="880" y2="160"/>
    <line x1="0" y1="180" x2="880" y2="180"/><line x1="0" y1="200" x2="880" y2="200"/>
    <line x1="0" y1="220" x2="880" y2="220"/><line x1="0" y1="240" x2="880" y2="240"/>
    <line x1="0" y1="260" x2="880" y2="260"/><line x1="0" y1="280" x2="880" y2="280"/>
    <line x1="0" y1="300" x2="880" y2="300"/><line x1="0" y1="320" x2="880" y2="320"/>
  </g>

  <!-- Spores -->
  <circle cx="120" cy="80" r="40" fill="#40d8c0" opacity="0.03"/>
  <circle cx="760" cy="360" r="45" fill="#40d8c0" opacity="0.03"/>
  <circle cx="440" cy="420" r="35" fill="#40d8c0" opacity="0.04"/>

  <!-- Caustics -->
  <ellipse cx="440" cy="220" rx="200" ry="60" fill="#00c8dc" opacity="0.015" transform="rotate(-2,440,220)"/>

  <!-- Particules -->
  <circle cx="200" cy="100" r="1" fill="#40d8c0" opacity="0.15"/>
  <circle cx="680" cy="80" r="1.2" fill="#40d8c0" opacity="0.12"/>
  <circle cx="100" cy="380" r="0.8" fill="#40d8c0" opacity="0.18"/>
  <circle cx="800" cy="160" r="1" fill="#40d8c0" opacity="0.14"/>
  <circle cx="350" cy="410" r="0.9" fill="#40d8c0" opacity="0.16"/>

  <!-- Label section -->
  <text x="440" y="38" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="rgba(64,216,192,0.5)" letter-spacing="0.12em">ORCHESTRATION</text>
  <text x="440" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(64,216,192,0.25)" font-style="italic">l'humain porte le contexte entre les personas</text>

  <!-- ════════════════════════════════════════
       PO (centre)
  ════════════════════════════════════════ -->
  <circle cx="440" cy="220" r="44" fill="rgba(64,216,192,0.06)" stroke="#40d8c0" stroke-width="1.2" filter="url(#glow)"/>
  <text x="440" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#f0f8f5" font-weight="300">PO</text>
  <text x="440" y="232" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(64,216,192,0.4)">humain</text>

  <!-- ════════════════════════════════════════
       4 PERSONAS
  ════════════════════════════════════════ -->

  <!-- Architecte (haut gauche) -->
  <rect x="60" y="88" width="170" height="64" rx="6" fill="rgba(64,216,192,0.04)" stroke="rgba(64,216,192,0.25)" stroke-width="0.8"/>
  <text x="145" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#f0f8f5" font-weight="300">Architecte</text>
  <text x="145" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(64,216,192,0.35)">specs · ADR · reviews</text>
  <text x="145" y="145" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(236,72,153,0.35)">ne code pas</text>

  <!-- Dev (haut droite) -->
  <rect x="650" y="88" width="170" height="64" rx="6" fill="rgba(64,216,192,0.04)" stroke="rgba(64,216,192,0.25)" stroke-width="0.8"/>
  <text x="735" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#f0f8f5" font-weight="300">Dev</text>
  <text x="735" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(64,216,192,0.35)">code · tests · frictions</text>
  <text x="735" y="145" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(236,72,153,0.35)">ne decide pas l'archi</text>

  <!-- Stratege (bas gauche) -->
  <rect x="60" y="290" width="170" height="64" rx="6" fill="rgba(64,216,192,0.04)" stroke="rgba(64,216,192,0.25)" stroke-width="0.8"/>
  <text x="145" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#f0f8f5" font-weight="300">Stratege</text>
  <text x="145" y="334" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(64,216,192,0.35)">positionnement · pricing</text>
  <text x="145" y="347" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(236,72,153,0.35)">pas d'acces au code</text>

  <!-- UX (bas droite) -->
  <rect x="650" y="290" width="170" height="64" rx="6" fill="rgba(64,216,192,0.04)" stroke="rgba(64,216,192,0.25)" stroke-width="0.8"/>
  <text x="735" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#f0f8f5" font-weight="300">UX</text>
  <text x="735" y="334" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(64,216,192,0.35)">parcours · maquettes</text>
  <text x="735" y="347" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(236,72,153,0.35)">ne valide pas la faisabilite</text>

  <!-- ════════════════════════════════════════
       CONNEXIONS PO ↔ Personas (mycélium)
  ════════════════════════════════════════ -->

  <!-- PO ↔ Architecte -->
  <path d="M 398,185 Q 310,150 232,130" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="0.8"/>
  <polygon points="232,130 240,126 238,134" fill="rgba(64,216,192,0.3)"/>

  <!-- PO ↔ Dev -->
  <path d="M 482,185 Q 570,150 648,130" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="0.8"/>
  <polygon points="648,130 642,134 640,126" fill="rgba(64,216,192,0.3)"/>

  <!-- PO ↔ Stratege -->
  <path d="M 398,255 Q 310,290 232,310" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="0.8"/>
  <polygon points="232,310 240,306 238,314" fill="rgba(64,216,192,0.3)"/>

  <!-- PO ↔ UX -->
  <path d="M 482,255 Q 570,290 648,310" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="0.8"/>
  <polygon points="648,310 642,314 640,306" fill="rgba(64,216,192,0.3)"/>

  <!-- ════════════════════════════════════════
       PAS DE LIEN DIRECT
  ════════════════════════════════════════ -->

  <!-- Haut : Archi ↔ Dev -->
  <line x1="232" y1="108" x2="648" y2="108" stroke="rgba(64,180,160,0.06)" stroke-width="0.6" stroke-dasharray="3,5"/>
  <text x="440" y="100" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(236,72,153,0.3)" letter-spacing="0.06em">PAS DE LIEN DIRECT</text>

  <!-- Bas : Stratege ↔ UX -->
  <line x1="232" y1="332" x2="648" y2="332" stroke="rgba(64,180,160,0.06)" stroke-width="0.6" stroke-dasharray="3,5"/>
  <text x="440" y="345" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(236,72,153,0.3)" letter-spacing="0.06em">PAS DE LIEN DIRECT</text>

  <!-- ════════════════════════════════════════
       SHARED/ (bas)
  ════════════════════════════════════════ -->
  <rect x="250" y="385" width="380" height="40" rx="6" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="0.6"/>
  <text x="440" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a78bfa" font-weight="300">shared/</text>
  <text x="440" y="419" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="rgba(167,139,250,0.35)">notes · reviews · features — le bus d'echange</text>

  <!-- Mycélium PO → shared -->
  <path d="M 440,264 Q 442,320 440,383" fill="none" stroke="rgba(167,139,250,0.18)" stroke-width="0.6"/>
  <polygon points="440,383 436,375 444,375" fill="rgba(167,139,250,0.3)"/>

  <!-- ════════════════════════════════════════
       LEGENDE
  ════════════════════════════════════════ -->
  <!-- Filet footer -->
  <line x1="40" y1="440" x2="840" y2="440" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="440" y="454" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="rgba(64,216,192,0.18)" font-style="italic">chaque fleche passe par le PO — pas de raccourci</text>
</svg>
