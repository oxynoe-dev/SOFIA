<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
  </defs>

  <rect width="600" height="420" fill="url(#bg)"/>

  <!-- Label -->
  <text x="300" y="38" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="rgba(64,216,192,0.5)" letter-spacing="0.12em">LE TRIANGLE SOFIA</text>

  <!-- ════════════════════════════════════════
       ARCS DU TRIANGLE (dessous les nodes)
  ════════════════════════════════════════ -->
  <!-- Persona → Artefact -->
  <path d="M 270,140 Q 200,210 160,280" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="1"/>
  <!-- Persona → Friction -->
  <path d="M 330,140 Q 400,210 440,280" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="1"/>
  <!-- Artefact → Friction -->
  <path d="M 200,310 Q 300,340 400,310" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="1"/>

  <!-- Labels sur les arcs -->
  <text x="195" y="195" font-family="Georgia, serif" font-size="9" fill="rgba(64,216,192,0.2)" font-style="italic" transform="rotate(-48,195,195)">isole</text>
  <text x="395" y="195" font-family="Georgia, serif" font-size="9" fill="rgba(64,216,192,0.2)" font-style="italic" transform="rotate(48,395,195)">genere</text>
  <text x="300" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="rgba(64,216,192,0.2)" font-style="italic">materialise</text>

  <!-- ════════════════════════════════════════
       PERSONA (haut)
  ════════════════════════════════════════ -->
  <circle cx="300" cy="115" r="42" fill="rgba(64,216,192,0.05)" stroke="rgba(64,216,192,0.3)" stroke-width="1"/>
  <text x="300" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#f0f8f5" font-weight="300">Persona</text>
  <text x="300" y="128" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(64,216,192,0.4)">contrainte</text>

  <!-- ════════════════════════════════════════
       ARTEFACT (bas gauche)
  ════════════════════════════════════════ -->
  <circle cx="155" cy="305" r="42" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="155" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#a78bfa" font-weight="300">Artefact</text>
  <text x="155" y="318" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(167,139,250,0.4)">protocole</text>

  <!-- ════════════════════════════════════════
       FRICTION (bas droite)
  ════════════════════════════════════════ -->
  <circle cx="445" cy="305" r="42" fill="rgba(224,80,80,0.04)" stroke="rgba(224,80,80,0.25)" stroke-width="1"/>
  <text x="445" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="rgba(224,80,80,0.7)" font-weight="300">Friction</text>
  <text x="445" y="318" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(224,80,80,0.35)">signal</text>

  <!-- ════════════════════════════════════════
       PO (centre)
  ════════════════════════════════════════ -->
  <circle cx="300" cy="235" r="30" fill="rgba(64,216,192,0.06)" stroke="#40d8c0" stroke-width="1.2"/>
  <text x="300" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#f0f8f5" font-weight="300">Humain</text>
  <text x="300" y="246" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(64,216,192,0.4)">arbitre</text>

  <!-- Filet footer -->
  <line x1="40" y1="390" x2="560" y2="390" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="300" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="rgba(64,216,192,0.15)" font-style="italic">trois concepts interdependants — le PO au centre</text>
</svg>
