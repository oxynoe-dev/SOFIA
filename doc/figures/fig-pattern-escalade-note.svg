<?xml version="1.0" encoding="UTF-8"?>
<!-- Fig. — Pattern Escalade par note — 05/04/2026 -->
<svg viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono,monospace">

  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,200,220,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="250" fill="url(#bg-grad)" rx="6"/>
