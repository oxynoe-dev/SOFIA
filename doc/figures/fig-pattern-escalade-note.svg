  ════════════════════════════════════════ -->
  <rect x="30" y="80" width="100" height="50" rx="3" fill="rgba(79,138,255,0.05)" stroke="rgba(79,138,255,0.2)" stroke-width="0.7"/>
  <text x="80" y="109" text-anchor="middle" fill="rgba(64,216,192,0.6)" font-size="9">Persona A</text>
  <!-- Coral problem indicator -->
