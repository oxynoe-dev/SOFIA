  <text x="243" y="104" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-size="7">shared/notes/</text>
  <text x="243" y="118" text-anchor="middle" fill="rgba(64,216,192,0.25)" font-size="6">bus asynchrone</text>

