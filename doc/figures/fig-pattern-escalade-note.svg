  <!-- ════════════════════════════════════════
       TITRE
  ════════════════════════════════════════ -->
  <text x="300" y="28" text-anchor="middle" fill="#f0f8f5" font-family="Georgia,serif" font-size="14" font-weight="300" letter-spacing="0.03em">Pattern — Escalade par note</text>

  <!-- ════════════════════════════════════════
       FLOW LABEL
  ════════════════════════════════════════ -->
  <text x="300" y="65" text-anchor="middle" fill="rgba(64,216,192,0.25)" font-size="7">probleme detecte                         decision routee                      action</text>

