  <line x1="130" y1="105" x2="182" y2="105" stroke="rgba(64,216,192,0.15)" stroke-width="1"/>
  <path d="M7,-3.5 L0,0 L7,3.5Z" fill="rgba(64,216,192,0.25)" transform="translate(188,105) rotate(180)"/>
  <text x="157" y="97" text-anchor="middle" fill="rgba(64,216,192,0.35)" font-size="7">note</text>

