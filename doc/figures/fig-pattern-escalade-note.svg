  <line x1="295" y1="153" x2="305" y2="167" stroke="#e05050" stroke-width="1.5" opacity="0.6"/>
  <line x1="305" y1="153" x2="295" y2="167" stroke="#e05050" stroke-width="1.5" opacity="0.6"/>

  <!-- Annotation -->
