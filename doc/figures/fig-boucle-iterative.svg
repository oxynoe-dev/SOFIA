<?xml version="1.0" encoding="UTF-8"?>
<!-- Fig. — Boucle iterative 2 personas — 05/04/2026 -->
<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <marker id="arrow-r" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7Z" fill="rgba(167,139,250,0.35)"/>
    </marker>
    <marker id="arrow-l" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M10,0 L0,3.5 L10,7Z" fill="rgba(167,139,250,0.35)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="url(#bg-grad)" rx="6"/>
  <!-- ════════════════════════════════════════
       TITLE
  ════════════════════════════════════════ -->
  <text x="440" y="30" text-anchor="middle" fill="#f0f8f5" font-family="Georgia, serif" font-size="15" font-weight="300" letter-spacing="0.03em">Boucle iterative — spec &amp; review</text>

  <!-- ════════════════════════════════════════
       COLUMN HEADERS
  ════════════════════════════════════════ -->
  <!-- Persona A -->
  <circle cx="200" cy="60" r="8" fill="rgba(64,216,192,0.08)" stroke="rgba(64,180,160,0.3)" stroke-width="1"/>
  <text x="200" y="64" text-anchor="middle" fill="rgba(64,216,192,0.6)" font-family="'IBM Plex Mono', monospace" font-size="7">A</text>
  <text x="200" y="82" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="0.1em">SPEC</text>

  <!-- PO -->
  <circle cx="440" cy="60" r="10" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.4)" stroke-width="1.2"/>
  <text x="440" y="64" text-anchor="middle" fill="rgba(167,139,250,0.7)" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="600">PO</text>

  <!-- Persona B -->
  <circle cx="680" cy="60" r="8" fill="rgba(64,216,192,0.08)" stroke="rgba(64,180,160,0.3)" stroke-width="1"/>
  <text x="680" y="64" text-anchor="middle" fill="rgba(64,216,192,0.6)" font-family="'IBM Plex Mono', monospace" font-size="7">B</text>
  <text x="680" y="82" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="0.1em">REVIEW</text>

  <!-- Column guides -->
  <line x1="200" y1="90" x2="200" y2="340" stroke="rgba(64,216,192,0.05)" stroke-width="0.5" stroke-dasharray="4,8"/>
  <line x1="440" y1="76" x2="440" y2="340" stroke="rgba(167,139,250,0.06)" stroke-width="0.5" stroke-dasharray="4,8"/>
  <line x1="680" y1="90" x2="680" y2="340" stroke="rgba(64,216,192,0.05)" stroke-width="0.5" stroke-dasharray="4,8"/>

  <!-- ════════════════════════════════════════
       ITERATION 1
  ════════════════════════════════════════ -->
  <text x="60" y="118" fill="rgba(64,216,192,0.3)" font-family="'IBM Plex Mono', monospace" font-size="8" letter-spacing="0.08em">IT.1</text>

  <!-- PO → A : spec -->
  <path d="M 428,105 C 370,108 290,110 212,112" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1" marker-end="url(#arrow-l)"/>
  <text x="320" y="102" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter, system-ui, sans-serif" font-size="8">"redige la spec"</text>

  <!-- A produces -->
  <rect x="140" y="120" width="120" height="28" rx="3" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="200" y="138" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="7" letter-spacing="0.05em">SPEC-V1.MD</text>

  <!-- PO → B : review -->
  <path d="M 452,140 C 510,142 600,144 668,146" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1" marker-end="url(#arrow-r)"/>
  <text x="560" y="136" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter, system-ui, sans-serif" font-size="8">"review cette spec"</text>

  <!-- PO relay dot -->
  <circle cx="440" cy="140" r="4" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>

  <!-- B reviews -->
  <rect x="620" y="154" width="120" height="28" rx="3" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="680" y="172" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="7" letter-spacing="0.05em">REVIEW-V1.MD</text>

  <!-- Zigzag connector 1→2 -->
  <path d="M 620,172 C 540,185 460,188 440,190" fill="none" stroke="rgba(64,216,192,0.12)" stroke-width="0.7"/>

  <!-- ════════════════════════════════════════
       ITERATION 2
  ════════════════════════════════════════ -->
  <text x="60" y="210" fill="rgba(64,216,192,0.3)" font-family="'IBM Plex Mono', monospace" font-size="8" letter-spacing="0.08em">IT.2</text>

  <!-- PO → A : integrate -->
  <circle cx="440" cy="200" r="4" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>
  <path d="M 428,200 C 370,202 290,205 212,207" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1" marker-end="url(#arrow-l)"/>
  <text x="320" y="196" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter, system-ui, sans-serif" font-size="8">"integre les retours"</text>

  <!-- A integrates -->
  <rect x="140" y="215" width="120" height="28" rx="3" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="200" y="233" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="7" letter-spacing="0.05em">SPEC-V2.MD</text>

  <!-- PO → B : re-review -->
  <circle cx="440" cy="240" r="4" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>
  <path d="M 452,240 C 510,242 600,244 668,246" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1" marker-end="url(#arrow-r)"/>
  <text x="560" y="236" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter, system-ui, sans-serif" font-size="8">"re-review v2"</text>

  <!-- B re-reviews -->
  <rect x="620" y="254" width="120" height="28" rx="3" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="680" y="272" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="7" letter-spacing="0.05em">REVIEW-V2.MD</text>

  <!-- Zigzag connector 2→decision -->
  <path d="M 620,272 C 540,285 460,290 440,295" fill="none" stroke="rgba(64,216,192,0.12)" stroke-width="0.7"/>

  <!-- ════════════════════════════════════════
       ITERATION SPIRAL HINT (subtle curves)
  ════════════════════════════════════════ -->
  <!-- Subtle spiral showing narrowing -->
  <path d="M 260,135 C 420,160 420,175 260,228" fill="none" stroke="rgba(64,216,192,0.06)" stroke-width="0.5"/>
  <path d="M 620,168 C 460,190 460,210 620,260" fill="none" stroke="rgba(64,216,192,0.06)" stroke-width="0.5"/>

  <!-- ════════════════════════════════════════
       MATURITY CHECK — PO decides
  ════════════════════════════════════════ -->
  <text x="60" y="310" fill="rgba(236,72,153,0.4)" font-family="'IBM Plex Mono', monospace" font-size="8" letter-spacing="0.08em">FIN</text>

  <circle cx="440" cy="310" r="5" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>

  <!-- Decision box -->
  <rect x="340" y="325" width="200" height="36" rx="5" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="440" y="342" text-anchor="middle" fill="rgba(167,139,250,0.6)" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="0.08em">PO TRANCHE</text>
  <text x="440" y="355" text-anchor="middle" fill="rgba(64,216,192,0.35)" font-family="Inter, system-ui, sans-serif" font-size="7">maturite suffisante</text>
  <line x1="440" y1="316" x2="440" y2="323" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>

  <!-- ════════════════════════════════════════
       ITERATION COUNTER (right side)
  ════════════════════════════════════════ -->
  <text x="810" y="150" text-anchor="middle" fill="rgba(64,216,192,0.2)" font-family="Inter, system-ui, sans-serif" font-size="7">n iterations</text>
  <text x="810" y="162" text-anchor="middle" fill="rgba(64,216,192,0.2)" font-family="Inter, system-ui, sans-serif" font-size="7">jusqu'a maturite</text>

  <!-- Bracket -->
  <path d="M 790,105 C 785,105 783,105 783,110 L 783,290 C 783,295 785,295 790,295" fill="none" stroke="rgba(64,216,192,0.1)" stroke-width="0.7"/>
  <line x1="783" y1="200" x2="790" y2="200" stroke="rgba(64,216,192,0.1)" stroke-width="0.7"/>

  <!-- ════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════ -->
  <line x1="60" y1="378" x2="820" y2="378" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="440" y="392" text-anchor="middle" fill="rgba(64,216,192,0.2)" font-family="Inter, system-ui, sans-serif" font-size="7">Voix — methode Oxynoe — 05/04/2026</text>

</svg>