<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="600" height="420" fill="url(#bg)"/>

  <!-- Grille -->
  <g opacity="0.05" stroke="#00c8dc" stroke-width="0.3">
    <line x1="0" y1="20" x2="600" y2="20"/><line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="60" x2="600" y2="60"/><line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="140" x2="600" y2="140"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="180" x2="600" y2="180"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="220" x2="600" y2="220"/><line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="260" x2="600" y2="260"/><line x1="0" y1="280" x2="600" y2="280"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="320" x2="600" y2="320"/>
  </g>

  <!-- Spores -->
  <circle cx="80" cy="60" r="35" fill="#40d8c0" opacity="0.03"/>
  <circle cx="520" cy="100" r="40" fill="#40d8c0" opacity="0.03"/>
  <circle cx="300" cy="380" r="45" fill="#40d8c0" opacity="0.03"/>
  <circle cx="100" cy="320" r="25" fill="#40d8c0" opacity="0.04"/>

  <!-- Caustics -->
  <ellipse cx="300" cy="220" rx="160" ry="50" fill="#00c8dc" opacity="0.015" transform="rotate(-3,300,220)"/>
  <ellipse cx="150" cy="340" rx="80" ry="20" fill="#00c8dc" opacity="0.02"/>

  <!-- Particules -->
  <circle cx="120" cy="130" r="1" fill="#40d8c0" opacity="0.15"/>
  <circle cx="480" cy="80" r="1.2" fill="#40d8c0" opacity="0.12"/>
  <circle cx="50" cy="280" r="0.8" fill="#40d8c0" opacity="0.18"/>
  <circle cx="550" cy="300" r="1" fill="#40d8c0" opacity="0.14"/>
  <circle cx="350" cy="50" r="0.9" fill="#40d8c0" opacity="0.16"/>

  <!-- Label -->
  <text x="300" y="38" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="rgba(64,216,192,0.5)" letter-spacing="0.12em">LE TRIANGLE VOIX</text>

  <!-- ════════════════════════════════════════
       ARCS DU TRIANGLE (dessous les nodes)
  ════════════════════════════════════════ -->
  <!-- Persona → Artefact -->
  <path d="M 270,140 Q 200,210 160,280" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="1"/>
  <!-- Persona → Friction -->
  <path d="M 330,140 Q 400,210 440,280" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="1"/>
  <!-- Artefact → Friction -->
  <path d="M 200,310 Q 300,340 400,310" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="1"/>

  <!-- Labels sur les arcs -->
  <text x="195" y="195" font-family="Georgia, serif" font-size="9" fill="rgba(64,216,192,0.2)" font-style="italic" transform="rotate(-48,195,195)">isole</text>
  <text x="395" y="195" font-family="Georgia, serif" font-size="9" fill="rgba(64,216,192,0.2)" font-style="italic" transform="rotate(48,395,195)">genere</text>
  <text x="300" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="rgba(64,216,192,0.2)" font-style="italic">materialise</text>

  <!-- ════════════════════════════════════════
       PERSONA (haut)
  ════════════════════════════════════════ -->
  <circle cx="300" cy="115" r="42" fill="rgba(64,216,192,0.05)" stroke="rgba(64,216,192,0.3)" stroke-width="1" filter="url(#glow)"/>
  <text x="300" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#f0f8f5" font-weight="300">Persona</text>
  <text x="300" y="128" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(64,216,192,0.4)">contrainte</text>

  <!-- ════════════════════════════════════════
       ARTEFACT (bas gauche)
  ════════════════════════════════════════ -->
  <circle cx="155" cy="305" r="42" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.3)" stroke-width="1" filter="url(#glow-sm)"/>
  <text x="155" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#a78bfa" font-weight="300">Artefact</text>
  <text x="155" y="318" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(167,139,250,0.4)">protocole</text>

  <!-- ════════════════════════════════════════
       FRICTION (bas droite)
  ════════════════════════════════════════ -->
  <circle cx="445" cy="305" r="42" fill="rgba(224,80,80,0.04)" stroke="rgba(224,80,80,0.25)" stroke-width="1" filter="url(#glow-sm)"/>
  <text x="445" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="rgba(224,80,80,0.7)" font-weight="300">Friction</text>
  <text x="445" y="318" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(224,80,80,0.35)">signal</text>

  <!-- ════════════════════════════════════════
       PO (centre)
  ════════════════════════════════════════ -->
  <circle cx="300" cy="235" r="30" fill="rgba(64,216,192,0.06)" stroke="#40d8c0" stroke-width="1.2" filter="url(#glow)"/>
  <text x="300" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#f0f8f5" font-weight="300">PO</text>
  <text x="300" y="246" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="rgba(64,216,192,0.4)">arbitre</text>

  <!-- Filet footer -->
  <line x1="40" y1="390" x2="560" y2="390" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="300" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="rgba(64,216,192,0.15)" font-style="italic">trois concepts interdependants — le PO au centre</text>
</svg>
