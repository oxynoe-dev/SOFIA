  <text x="480" y="50" text-anchor="middle" font-size="8" fill="rgba(167,139,250,0.4)" letter-spacing="0.1em">CORE (why) · PROTOCOL (what to trace) · IMPLEMENTATION (how) · RUNTIME (with what) · CANVAS (inspiration) · DOC</text>

