<?xml version="1.0" encoding="UTF-8"?>
<!-- Fig. — Pattern Revue en etoile — 07/04/2026 -->
<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono,monospace">

  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,200,220,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="500" height="400" fill="url(#bg-grad)" rx="6"/>
  <rect width="500" height="400" fill="url(#grid)" rx="6"/>

  <!-- TITRE -->
  <text x="250" y="28" text-anchor="middle" fill="#f0f8f5" font-family="Georgia,serif" font-size="14" font-weight="300" letter-spacing="0.03em">Pattern — Star review</text>

  <!-- PERSONAS (top) -->
  <rect x="30" y="55" width="120" height="38" rx="3" fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.45)" stroke-width="0.8"/>
  <text x="90" y="77" text-anchor="middle" fill="rgba(64,216,192,0.85)" font-size="9">Persona A</text>

  <rect x="190" y="55" width="120" height="38" rx="3" fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.45)" stroke-width="0.8"/>
  <text x="250" y="77" text-anchor="middle" fill="rgba(64,216,192,0.85)" font-size="9">Persona B</text>

  <rect x="350" y="55" width="120" height="38" rx="3" fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.45)" stroke-width="0.8"/>
  <text x="410" y="77" text-anchor="middle" fill="rgba(64,216,192,0.85)" font-size="9">Persona C</text>

  <!-- ARTIFACT (center) -->
  <rect x="175" y="175" width="150" height="50" rx="4" fill="rgba(79,138,255,0.12)" stroke="rgba(79,138,255,0.5)" stroke-width="1.2"/>
  <text x="250" y="204" text-anchor="middle" fill="#7ab0ff" font-size="10" font-weight="500">Artifact</text>

  <!-- FLECHES PERSONAS → ARTIFACT -->
  <line x1="90" y1="93" x2="195" y2="175" stroke="rgba(61,220,132,0.4)" stroke-width="1"/>

  <line x1="250" y1="93" x2="250" y2="175" stroke="rgba(61,220,132,0.4)" stroke-width="1"/>

  <line x1="410" y1="93" x2="305" y2="175" stroke="rgba(61,220,132,0.4)" stroke-width="1"/>

  <!-- Labels axes -->
  <text x="130" y="135" text-anchor="middle" fill="rgba(64,216,192,0.45)" font-size="7">review axe A</text>
  <text x="250" y="135" text-anchor="middle" fill="rgba(64,216,192,0.45)" font-size="7">review axe B</text>
  <text x="370" y="135" text-anchor="middle" fill="rgba(64,216,192,0.45)" font-size="7">review axe C</text>

  <!-- HUMAIN (bottom) -->
  <rect x="175" y="300" width="150" height="50" rx="4" fill="rgba(212,160,48,0.12)" stroke="rgba(212,160,48,0.5)" stroke-width="1.2"/>
  <text x="250" y="326" text-anchor="middle" fill="#e0b840" font-size="10" font-weight="500">Human</text>
  <text x="250" y="340" text-anchor="middle" fill="rgba(212,160,48,0.6)" font-size="7">consolidates and decides</text>

  <!-- FLECHE ARTIFACT → HUMAIN -->
  <line x1="250" y1="225" x2="250" y2="300" stroke="rgba(212,160,48,0.4)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="280" y="265" fill="rgba(212,160,48,0.5)" font-size="7">synthesis</text>

  <!-- ANNOTATION -->
  <text x="250" y="375" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-size="7">each persona reviews on their axis — no peer consensus</text>

  <!-- SPORES -->
  <circle cx="30" cy="370" r="1.2" fill="rgba(64,216,192,0.04)"/>
  <circle cx="470" cy="350" r="1.0" fill="rgba(64,216,192,0.04)"/>
  <circle cx="20" cy="140" r="1.4" fill="rgba(64,216,192,0.04)"/>
  <circle cx="480" cy="130" r="0.9" fill="rgba(64,216,192,0.04)"/>

  <!-- FOOTER -->
  <text x="250" y="393" text-anchor="middle" fill="rgba(64,216,192,0.3)" font-size="7">SOFIA — Oxynoe method — 07/04/2026</text>

</svg>
