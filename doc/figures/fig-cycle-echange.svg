<?xml version="1.0" encoding="UTF-8"?>
<!-- Fig. E — Cycle complet d'un échange — 05/04/2026 -->
<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,200,220,0.06)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="url(#bg-grad)" rx="6"/>
  <rect width="880" height="480" fill="url(#grid)" rx="6"/>

  <!-- Spores -->
  <circle cx="60" cy="100" r="14" fill="rgba(64,216,192,0.03)"/>
  <circle cx="830" cy="80" r="18" fill="rgba(64,216,192,0.03)"/>
  <circle cx="150" cy="420" r="12" fill="rgba(64,216,192,0.03)"/>
  <circle cx="750" cy="400" r="16" fill="rgba(64,216,192,0.03)"/>
  <circle cx="440" cy="460" r="22" fill="rgba(64,216,192,0.03)"/>
  <circle cx="300" cy="50" r="10" fill="rgba(64,216,192,0.03)"/>

  <!-- Caustics -->
  <ellipse cx="220" cy="250" rx="55" ry="20" fill="rgba(0,200,220,0.02)" transform="rotate(-8 220 250)"/>
  <ellipse cx="660" cy="300" rx="50" ry="22" fill="rgba(0,200,220,0.02)" transform="rotate(10 660 300)"/>
  <ellipse cx="440" cy="130" rx="70" ry="15" fill="rgba(0,200,220,0.02)" transform="rotate(-3 440 130)"/>

  <!-- Particles -->
  <circle cx="95" cy="175" r="1.1" fill="rgba(64,216,192,0.15)"/>
  <circle cx="790" cy="220" r="1.3" fill="rgba(64,216,192,0.14)"/>
  <circle cx="500" cy="55" r="0.9" fill="rgba(64,216,192,0.18)"/>
  <circle cx="200" cy="440" r="1.2" fill="rgba(64,216,192,0.12)"/>
  <circle cx="680" cy="450" r="1.5" fill="rgba(64,216,192,0.13)"/>
  <circle cx="360" cy="380" r="0.8" fill="rgba(64,216,192,0.16)"/>
  <circle cx="120" cy="340" r="1.0" fill="rgba(64,216,192,0.12)"/>
  <circle cx="820" cy="350" r="1.4" fill="rgba(64,216,192,0.14)"/>

  <!-- ════════════════════════════════════════
       TITLE
  ════════════════════════════════════════ -->
  <text x="440" y="30" text-anchor="middle" fill="#f0f8f5" font-family="Georgia,serif" font-size="14" font-weight="300" letter-spacing="0.03em">Cycle complet d'un echange</text>

  <!-- ════════════════════════════════════════
       COLUMN HEADERS
  ════════════════════════════════════════ -->
  <text x="110" y="62" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="IBM Plex Mono,monospace" font-size="9" letter-spacing="0.1em">PERSONA A</text>
  <text x="330" y="62" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="IBM Plex Mono,monospace" font-size="9" letter-spacing="0.1em">SHARED/</text>
  <text x="550" y="62" text-anchor="middle" fill="rgba(167,139,250,0.6)" font-family="IBM Plex Mono,monospace" font-size="9" letter-spacing="0.1em">PO</text>
  <text x="770" y="62" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="IBM Plex Mono,monospace" font-size="9" letter-spacing="0.1em">PERSONA B</text>

  <!-- Column separators -->
  <line x1="220" y1="50" x2="220" y2="420" stroke="rgba(64,180,160,0.08)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="440" y1="50" x2="440" y2="420" stroke="rgba(64,180,160,0.08)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="660" y1="50" x2="660" y2="420" stroke="rgba(64,180,160,0.08)" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- ════════════════════════════════════════
       TIMELINE — vertical guide
  ════════════════════════════════════════ -->

  <!-- ── STEP 1: Persona A rédige artefact ── -->
  <rect x="30" y="82" width="160" height="32" rx="4" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="110" y="102" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter,sans-serif" font-size="9">redige artefact</text>

  <!-- Arrow 1: A → shared/ -->
  <path d="M 190 98 C 230 98, 250 98, 270 98" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="1"/>
  <path d="M7,-3.5 L0,0 L7,3.5Z" fill="rgba(64,216,192,0.3)" transform="translate(275,98) rotate(0)"/>

  <!-- ── STEP 2: Déposé dans shared/ ── -->
  <rect x="250" y="82" width="160" height="32" rx="4" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.2)" stroke-width="0.8"/>
  <text x="330" y="102" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="IBM Plex Mono,monospace" font-size="8">depose dans bus</text>

  <!-- Arrow 2: shared/ → PO -->
  <path d="M 410 98 C 430 98, 440 110, 460 130" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="1"/>
  <path d="M7,-3.5 L0,0 L7,3.5Z" fill="rgba(64,216,192,0.3)" transform="translate(462,134) rotate(60)"/>

  <!-- ── STEP 3: PO lit l'artefact ── -->
  <rect x="470" y="125" width="160" height="32" rx="4" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.25)" stroke-width="0.8"/>
  <text x="550" y="145" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter,sans-serif" font-size="9">lit l'artefact</text>

  <!-- ── STEP 4: PO filtre ── -->
  <rect x="470" y="168" width="160" height="28" rx="4" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8" filter="url(#glow-sm)"/>
  <text x="550" y="186" text-anchor="middle" fill="rgba(167,139,250,0.7)" font-family="IBM Plex Mono,monospace" font-size="8" letter-spacing="0.05em">filtre</text>

  <!-- ── STEP 5: PO contextualise ── -->
  <rect x="470" y="205" width="160" height="28" rx="4" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8" filter="url(#glow-sm)"/>
  <text x="550" y="223" text-anchor="middle" fill="rgba(167,139,250,0.7)" font-family="IBM Plex Mono,monospace" font-size="8" letter-spacing="0.05em">contextualise</text>

  <!-- ── STEP 6: PO transmet → Persona B ── -->
  <path d="M 630 236 C 660 250, 690 258, 710 258" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="1"/>
  <path d="M7,-3.5 L0,0 L7,3.5Z" fill="rgba(64,216,192,0.3)" transform="translate(715,258) rotate(0)"/>

  <!-- Arrow connector between PO steps -->
  <line x1="550" y1="157" x2="550" y2="168" stroke="rgba(167,139,250,0.15)" stroke-width="0.7"/>
  <line x1="550" y1="196" x2="550" y2="205" stroke="rgba(167,139,250,0.15)" stroke-width="0.7"/>
  <line x1="550" y1="233" x2="550" y2="240" stroke="rgba(167,139,250,0.15)" stroke-width="0.7"/>

  <rect x="470" y="242" width="160" height="28" rx="4" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="550" y="260" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter,sans-serif" font-size="9">transmet</text>

  <!-- ── STEP 7: Persona B lit, réagit ── -->
  <rect x="690" y="244" width="160" height="32" rx="4" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="770" y="264" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter,sans-serif" font-size="9">lit, reagit</text>

  <!-- ── STEP 8: Persona B dépose réponse ── -->
  <!-- Arrow B → shared/ (going back left) -->
  <path d="M 690 290 C 600 300, 500 305, 460 310" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="1"/>
  <path d="M7,-3.5 L0,0 L7,3.5Z" fill="rgba(64,216,192,0.3)" transform="translate(455,311) rotate(170)"/>

  <rect x="690" y="284" width="160" height="32" rx="4" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="770" y="304" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter,sans-serif" font-size="9">depose reponse</text>

  <!-- shared/ receives response -->
  <rect x="250" y="296" width="160" height="32" rx="4" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.2)" stroke-width="0.8"/>
  <text x="330" y="316" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="IBM Plex Mono,monospace" font-size="8">reponse dans bus</text>

  <!-- Arrow shared/ → PO (reads response) -->
  <path d="M 410 312 C 430 312, 445 330, 462 345" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="1"/>
  <path d="M7,-3.5 L0,0 L7,3.5Z" fill="rgba(64,216,192,0.3)" transform="translate(464,349) rotate(60)"/>

  <!-- ── STEP 9: PO lit la réponse ── -->
  <rect x="470" y="340" width="160" height="28" rx="4" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.25)" stroke-width="0.8"/>
  <text x="550" y="358" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter,sans-serif" font-size="9">lit la reponse</text>

  <!-- ── STEP 10: PO tranche ── -->
  <rect x="470" y="377" width="160" height="28" rx="4" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1" filter="url(#glow)"/>
  <text x="550" y="395" text-anchor="middle" fill="rgba(167,139,250,0.7)" font-family="IBM Plex Mono,monospace" font-size="8" letter-spacing="0.05em">tranche</text>

  <!-- ── STEP 11: PO trace ── -->
  <rect x="470" y="414" width="160" height="28" rx="4" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8" filter="url(#glow-sm)"/>
  <text x="550" y="432" text-anchor="middle" fill="rgba(167,139,250,0.7)" font-family="IBM Plex Mono,monospace" font-size="8" letter-spacing="0.05em">trace (ADR / note)</text>

  <!-- Connectors between final PO steps -->
  <line x1="550" y1="368" x2="550" y2="377" stroke="rgba(167,139,250,0.15)" stroke-width="0.7"/>
  <line x1="550" y1="405" x2="550" y2="414" stroke="rgba(167,139,250,0.15)" stroke-width="0.7"/>

  <!-- ════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════ -->
  <line x1="40" y1="455" x2="840" y2="455" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="440" y="472" text-anchor="middle" fill="rgba(64,216,192,0.25)" font-family="IBM Plex Mono,monospace" font-size="7" letter-spacing="0.05em">voix — cycle complet d'un echange inter-personas</text>

</svg>