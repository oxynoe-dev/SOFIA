<?xml version="1.0" encoding="UTF-8"?>
<!-- Fig. — Pattern Distillerie — 05/04/2026 -->
<svg viewBox="0 0 500 320" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono,monospace">

