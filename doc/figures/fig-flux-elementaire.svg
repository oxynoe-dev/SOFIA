<?xml version="1.0" encoding="UTF-8"?>
<!-- Fig. — Flux elementaire d'orchestration — 05/04/2026 -->
<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a4858"/>
      <stop offset="100%" stop-color="#041c24"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7Z" fill="rgba(64,216,192,0.35)"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7Z" fill="rgba(167,139,250,0.4)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="url(#bg-grad)" rx="6"/>
  <!-- ════════════════════════════════════════
       TITLE
  ════════════════════════════════════════ -->
  <text x="440" y="32" text-anchor="middle" fill="#f0f8f5" font-family="Georgia, serif" font-size="15" font-weight="300" letter-spacing="0.03em">Flux elementaire — orchestration PO</text>

  <!-- ════════════════════════════════════════
       COLUMN HEADERS
  ════════════════════════════════════════ -->
  <!-- Persona A column -->
  <text x="180" y="62" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="0.1em" text-transform="uppercase">PERSONA A</text>

  <!-- PO column -->
  <text x="440" y="62" text-anchor="middle" fill="rgba(167,139,250,0.6)" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="0.1em">PO</text>

  <!-- Persona B column -->
  <text x="700" y="62" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="0.1em" text-transform="uppercase">PERSONA B</text>

  <!-- Column lines -->
  <line x1="180" y1="70" x2="180" y2="470" stroke="rgba(64,216,192,0.06)" stroke-width="0.5" stroke-dasharray="4,6"/>
  <line x1="440" y1="70" x2="440" y2="470" stroke="rgba(167,139,250,0.08)" stroke-width="0.5" stroke-dasharray="4,6"/>
  <line x1="700" y1="70" x2="700" y2="470" stroke="rgba(64,216,192,0.06)" stroke-width="0.5" stroke-dasharray="4,6"/>

  <!-- ════════════════════════════════════════
       STEP 1 — PO → A : review cet ADR
  ════════════════════════════════════════ -->
  <!-- PO node -->
  <circle cx="440" cy="100" r="6" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>

  <!-- Arrow PO → A -->
  <path d="M 428,100 C 350,100 280,100 198,100" fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="1.2" marker-end="url(#arrow-violet)"/>
  <text x="310" y="93" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter, system-ui, sans-serif" font-size="9">"review cet ADR"</text>

  <!-- A node -->
  <circle cx="180" cy="100" r="6" fill="rgba(64,216,192,0.12)" stroke="rgba(64,180,160,0.3)" stroke-width="1"/>

  <!-- ════════════════════════════════════════
       STEP 2 — A produces review → shared/
  ════════════════════════════════════════ -->
  <!-- A works -->
  <rect x="120" y="130" width="120" height="34" rx="4" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="180" y="150" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="8" letter-spacing="0.05em">REVIEW-ADR.MD</text>

  <!-- Arrow down from A to deposit -->
  <line x1="180" y1="108" x2="180" y2="128" stroke="rgba(64,216,192,0.2)" stroke-width="0.8"/>

  <!-- Deposit to shared -->
  <path d="M 240,147 C 300,147 340,160 380,170" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="330" y="155" text-anchor="middle" fill="rgba(64,216,192,0.3)" font-family="Inter, system-ui, sans-serif" font-size="7">shared/</text>

  <!-- ════════════════════════════════════════
       STEP 3 — PO reads, discusses with A
  ════════════════════════════════════════ -->
  <circle cx="440" cy="180" r="5" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>

  <!-- Bidirectional discussion -->
  <path d="M 428,175 C 350,165 280,170 198,172" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="0.8" stroke-dasharray="3,3"/>
  <path d="M 198,180 C 280,185 350,182 428,185" fill="none" stroke="rgba(64,216,192,0.15)" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="310" y="195" text-anchor="middle" fill="rgba(64,216,192,0.35)" font-family="Inter, system-ui, sans-serif" font-size="8">discussion</text>

  <!-- ════════════════════════════════════════
       STEP 4 — PO asks A to synthesize → note for B
  ════════════════════════════════════════ -->
  <circle cx="440" cy="235" r="5" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>

  <path d="M 428,235 C 350,235 280,235 198,235" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1" marker-end="url(#arrow-violet)"/>
  <text x="310" y="228" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter, system-ui, sans-serif" font-size="9">"synthetise pour B"</text>

  <circle cx="180" cy="235" r="5" fill="rgba(64,216,192,0.1)" stroke="rgba(64,180,160,0.25)" stroke-width="0.8"/>

  <!-- Note produced -->
  <rect x="120" y="260" width="120" height="34" rx="4" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="180" y="280" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="8" letter-spacing="0.05em">NOTE-POUR-B.MD</text>
  <line x1="180" y1="243" x2="180" y2="258" stroke="rgba(64,216,192,0.2)" stroke-width="0.8"/>

  <!-- ════════════════════════════════════════
       STEP 5 — PO closes session A
  ════════════════════════════════════════ -->
  <line x1="100" y1="316" x2="260" y2="316" stroke="rgba(236,72,153,0.2)" stroke-width="0.8" stroke-dasharray="2,4"/>
  <text x="180" y="330" text-anchor="middle" fill="rgba(236,72,153,0.4)" font-family="'IBM Plex Mono', monospace" font-size="7" letter-spacing="0.08em">SESSION A FERMEE</text>

  <!-- ════════════════════════════════════════
       STEP 6 — PO → B : t'as une note de A
  ════════════════════════════════════════ -->
  <circle cx="440" cy="365" r="6" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>

  <path d="M 452,365 C 530,365 600,365 682,365" fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="1.2" marker-end="url(#arrow-violet)"/>
  <text x="570" y="358" text-anchor="middle" fill="rgba(64,216,192,0.4)" font-family="Inter, system-ui, sans-serif" font-size="9">"t'as une note de A"</text>

  <circle cx="700" cy="365" r="6" fill="rgba(64,216,192,0.12)" stroke="rgba(64,180,160,0.3)" stroke-width="1"/>

  <!-- Note transmitted -->
  <path d="M 240,285 C 340,310 560,340 690,358" fill="none" stroke="rgba(64,216,192,0.12)" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="460" y="320" text-anchor="middle" fill="rgba(64,216,192,0.25)" font-family="Inter, system-ui, sans-serif" font-size="7">transmission via shared/</text>

  <!-- ════════════════════════════════════════
       STEP 7 — B reads, reacts → corrections
  ════════════════════════════════════════ -->
  <rect x="640" y="395" width="120" height="34" rx="4" fill="rgba(64,216,192,0.04)" stroke="rgba(64,180,160,0.2)" stroke-width="0.8"/>
  <text x="700" y="415" text-anchor="middle" fill="rgba(64,216,192,0.5)" font-family="'IBM Plex Mono', monospace" font-size="8" letter-spacing="0.05em">CORRECTIONS.MD</text>
  <line x1="700" y1="373" x2="700" y2="393" stroke="rgba(64,216,192,0.2)" stroke-width="0.8"/>

  <!-- B sends back to PO -->
  <path d="M 640,420 C 580,430 500,435 452,435" fill="none" stroke="rgba(64,216,192,0.2)" stroke-width="1" marker-end="url(#arrow)"/>
  <circle cx="440" cy="435" r="5" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>
  <text x="550" y="448" text-anchor="middle" fill="rgba(64,216,192,0.35)" font-family="Inter, system-ui, sans-serif" font-size="8">reaction</text>

  <!-- ════════════════════════════════════════
       STEP LABELS (timeline right margin)
  ════════════════════════════════════════ -->
  <text x="840" y="103" text-anchor="end" fill="rgba(64,216,192,0.25)" font-family="'IBM Plex Mono', monospace" font-size="7">1</text>
  <text x="840" y="150" text-anchor="end" fill="rgba(64,216,192,0.25)" font-family="'IBM Plex Mono', monospace" font-size="7">2</text>
  <text x="840" y="182" text-anchor="end" fill="rgba(64,216,192,0.25)" font-family="'IBM Plex Mono', monospace" font-size="7">3</text>
  <text x="840" y="237" text-anchor="end" fill="rgba(64,216,192,0.25)" font-family="'IBM Plex Mono', monospace" font-size="7">4</text>
  <text x="840" y="323" text-anchor="end" fill="rgba(236,72,153,0.3)" font-family="'IBM Plex Mono', monospace" font-size="7">5</text>
  <text x="840" y="368" text-anchor="end" fill="rgba(64,216,192,0.25)" font-family="'IBM Plex Mono', monospace" font-size="7">6</text>
  <text x="840" y="418" text-anchor="end" fill="rgba(64,216,192,0.25)" font-family="'IBM Plex Mono', monospace" font-size="7">7</text>

  <!-- Timeline line -->
  <line x1="852" y1="90" x2="852" y2="440" stroke="rgba(64,216,192,0.08)" stroke-width="0.5"/>

  <!-- ════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════ -->
  <line x1="60" y1="490" x2="820" y2="490" stroke="rgba(64,180,160,0.12)" stroke-width="0.5"/>
  <text x="440" y="506" text-anchor="middle" fill="rgba(64,216,192,0.2)" font-family="Inter, system-ui, sans-serif" font-size="7">Voix — methode Oxynoe — 05/04/2026</text>

</svg>